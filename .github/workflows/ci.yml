name: APEX Autopilot CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # Backend tests
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run smoke tests
        run: |
          pytest tests/ -v -m "not slow" --cov=src/apex --cov-report=xml -q
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  # Frontend tests
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: autopilot-local/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: autopilot-local/frontend
        run: npm ci
      
      - name: Build
        working-directory: autopilot-local/frontend
        run: npm run build
      
      - name: Install Playwright
        working-directory: autopilot-local/frontend
        run: npx playwright install --with-deps

      - name: Set up Python for E2E backend
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps for E2E
        run: pip install -e ".[dev]"

      - name: Start APEX backend for E2E
        run: |
          PYTHONPATH=src DEMO_MODE=true ALPACA_PAPER_TRADE=true \
          POLYMARKET_PAPER_TRADING_ENABLED=true \
          python -m uvicorn backend_api:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/apex_backend.pid
      
      - name: Wait for APEX health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Run E2E smoke tests
        working-directory: autopilot-local/frontend
        run: npx playwright test tests/e2e/smoke.spec.ts tests/e2e/arb-stream.spec.ts tests/e2e/risk-management.spec.ts tests/e2e/marketplace-api.spec.ts

      - name: Stop APEX backend
        if: always()
        run: kill $(cat /tmp/apex_backend.pid) 2>/dev/null || true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: autopilot-local/frontend/playwright-report/

  # Linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linters
        run: pip install ruff mypy
      
      - name: Run ruff
        run: ruff check src/
      
      - name: Run mypy
        run: mypy src/apex --ignore-missing-imports

  # Docker build
  docker:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/apex-backend:latest
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./autopilot-local/frontend
          file: Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/apex-frontend:latest
