# Cloud Build config pinned to the production Dockerfile (Dockerfile.cloudrun).
# Avoids accidentally building the dev-only ./Dockerfile (which runs tail -f).
# Invoked by deploy/deploy_cloud_run.sh via:  gcloud builds submit --config cloudbuild.yaml --substitutions=_IMAGE=...
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.cloudrun
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
options:
  logging: CLOUD_LOGGING_ONLY
