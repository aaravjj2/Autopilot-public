global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'apex-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  - job_name: 'apex-scheduler'
    static_configs:
      - targets: ['scheduler:8001']
    metrics_path: '/metrics'

  - job_name: 'apex-discord'
    static_configs:
      - targets: ['discord-bot:8002']
    metrics_path: '/metrics'
